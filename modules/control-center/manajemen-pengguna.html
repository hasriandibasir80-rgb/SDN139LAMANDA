<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Manajemen Pengguna - Control Center</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>
  <header class="header">
    <div class="logo-text" style="margin: 0 auto;">Control Center <span>ADMIN</span></div>
  </header>

  <div class="admin-container">
    <div class="admin-card">
      <div class="admin-header">
        <h1>👥 Manajemen Pengguna</h1>
        <span class="admin-badge">Admin Only</span>
      </div>

      <div style="margin-bottom: 20px;">
        <p class="helper-text" style="margin-bottom: 16px; font-size: 14px;">
          ℹ️ Kelola akun pengguna sistem. Password default untuk pengguna baru adalah <strong>sdn139lamanda2024</strong>. 
          Pastikan email dan nomor WhatsApp valid agar undangan dapat dikirim.
        </p>
        <button type="button" id="btnTambahUser" class="btn-admin-secondary" style="margin-bottom: 16px;">
          ➕ Tambah Pengguna Baru
        </button>
      </div>

      <!-- Container untuk daftar user (diisi secara dinamis oleh JS) -->
      <div id="daftarUserContainer"></div>

      <button type="button" id="btnSimpanUser" class="btn-admin-save" style="margin-top: 24px;">
        💾 Simpan Semua Perubahan
      </button>

      <div id="adminStatus" class="admin-status"></div>

      <a href="../../dashboard.html" class="btn-back-dashboard">← Kembali ke Dashboard Utama</a>
    </div>
  </div>

  <!-- Menghubungkan ke file JS Manajemen Pengguna (Versi Firestore) -->
  <script type="module" src="../../js/user-management.js"></script>
</body>
</html>
