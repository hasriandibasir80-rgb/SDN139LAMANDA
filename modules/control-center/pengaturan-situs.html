<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pengaturan Situs - Control Center</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>
  <header class="header">
    <div class="logo-text" style="margin: 0 auto;">Control Center <span>ADMIN</span></div>
  </header>

  <div class="admin-container">
    <div class="admin-card">
      <div class="admin-header">
        <h1>⚙️ Pengaturan Situs</h1>
        <span class="admin-badge">Admin Only</span>
      </div>

      <div style="margin-bottom: 20px;">
        <p style="color: #64748b; font-size: 14px; margin-bottom: 12px;">
          ℹ️ Tambahkan beberapa pengumuman. Setiap pengumuman akan tampil bergantian dengan efek slide dan running text. Durasi tampil diacak antara 6-12 detik.
        </p>
        <button type="button" id="btnTambahPengumuman" class="btn-admin-secondary" style="margin-bottom: 16px;">
          ➕ Tambah Pengumuman Baru
        </button>
      </div>

      <div id="daftarPengumumanContainer"></div>

      <button type="button" id="btnSimpanPengumuman" class="btn-admin-save" style="margin-top: 24px;">
        💾 Simpan Semua Perubahan
      </button>

      <div id="adminStatus" class="admin-status"></div>

      <a href="../../dashboard.html" class="btn-back-dashboard">← Kembali ke Dashboard Utama</a>
    </div>
  </div>

  <script type="module" src="../../js/admin.js"></script>
</body>
</html>
