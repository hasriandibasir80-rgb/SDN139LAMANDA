<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bantuan AI - SDN 139 LAMANDA</title>
  
  <link rel="stylesheet" href="../../css/core/variables.css">
  <link rel="stylesheet" href="../../css/core/reset.css">
  <link rel="stylesheet" href="../../css/layouts/main-layout.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <button class="menu-btn" onclick="window.location.href='../../dashboard.html'">← Kembali</button>
    <div class="logo-text">Bantuan <span>AI</span></div>
    <div style="width: 50px;"></div>
  </header>

  <div class="container">
    <!-- Chat Container -->
    <div id="chatContainer" class="chat-container">
      <div class="message ai">
        Halo, saya asisten AI. silahkan beri perintah atau pertanyaan
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-box">
        <textarea id="userInput" class="chat-input" placeholder="Ketik pertanyaan atau perintah Anda..." rows="2"></textarea>
        <button id="btnSend" class="btn-send">➤</button>
      </div>
      
      <div class="input-footer">
        <!-- Tombol Atur API Key sudah dihapus -->
        <button id="btnClearChat" class="link-btn">️ Hapus Chat</button>
        <span class="model-info">AI Assistant v1.0</span>
      </div>
    </div>
  </div>

  <script type="module" src="../../js/firebase-config.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
