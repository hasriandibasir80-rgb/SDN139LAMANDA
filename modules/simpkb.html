<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Portal SIMPKB - SDN 139 LAMANDA</title>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #1e88e5 0%, #0d47a1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    
    .redirect-card {
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      animation: fadeIn 0.5s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .logo-container {
      margin-bottom: 20px;
      background: #f0f7ff;
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
    }
    
    .logo-container img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    
    h1 {
      color: #2c3e50;
      font-size: 1.5rem;
      margin-bottom: 12px;
    }
    
    .subtitle {
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
      font-size: 14px;
    }
    
    .info-box {
      background: #e3f2fd;
      border-left: 4px solid #1e88e5;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      text-align: left;
      font-size: 13px;
      color: #1565c0;
    }
    
    .info-box strong {
      display: block;
      margin-bottom: 4px;
    }
    
    /* ✅ TOMBOL UTAMA: Buka SIMPKB di Tab Baru */
    .open-btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #1e88e5 0%, #1565c0 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(30, 136, 229, 0.3);
      margin-bottom: 12px;
    }
    
    .open-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(30, 136, 229, 0.4);
    }
    
    .open-btn:active {
      transform: translateY(0);
    }
    
    .open-btn::before {
      content: '🔗 ';
      margin-right: 8px;
    }
    
    /* Tombol Kembali ke Dashboard */
    .back-btn {
      display: inline-block;
      padding: 10px 20px;
      background: #f3f4f6;
      color: #4b5563;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s;
    }
    
    .back-btn:hover {
      background: #e5e7eb;
    }
    
    .back-btn::before {
      content: '← ';
    }
    
    .footer-note {
      margin-top: 20px;
      font-size: 12px;
      color: #9ca3af;
    }
    
    @media (max-width: 480px) {
      .redirect-card {
        padding: 24px 16px;
      }
      h1 {
        font-size: 1.3rem;
      }
      .logo-container img {
        width: 64px;
        height: 64px;
      }
    }
  </style>
</head>
<body>
  <div class="redirect-card">
    <div class="logo-container">
      <img src="https://portal.simpkb.id/favicon.ico" alt="Logo SIMPKB" 
           onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%231e88e5%22%3E%3Cpath d=%22M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5%22/%3E%3C/svg%3E';">
    </div>
    
    <h1>Portal SIMPKB</h1>
    <p class="subtitle">Sistem Informasi Manajemen Pengembangan Keprofesian Berkelanjutan</p>
    
    <div class="info-box">
      <strong>ℹ️ Informasi:</strong>
      Portal SIMPKB akan terbuka di <strong>tab baru</strong>. Tab aplikasi Anda akan tetap aktif dan tidak terganggu.
    </div>
    
    <!-- ✅ TOMBOL UTAMA: User klik manual untuk buka tab baru -->
    <a href="https://portal.simpkb.id/" 
       target="_blank" 
       rel="noopener noreferrer" 
       class="open-btn"
       id="openSimpkbBtn">
      Buka SIMPKB di Tab Baru
    </a>
    
    <!-- Tombol Kembali ke Dashboard -->
    <a href="../dashboard.html" class="back-btn">Kembali ke Dashboard</a>
    
    <p class="footer-note">
      © SDN 139 LAMANDA - Layanan Portal
    </p>
  </div>

  <script>
    // ✅ LOGIKA BARU: Tidak ada auto-open, tidak ada auto-redirect
    // User punya kontrol penuh melalui klik tombol manual
    
    document.getElementById('openSimpkbBtn').addEventListener('click', function(e) {
      // Log tambahan untuk debugging (opsional)
      console.log('🔗 User membuka SIMPKB di tab baru');
      
      // Tidak perlu preventDefault karena href dan target="_blank" sudah di-set di HTML
      // Browser akan mengizinkan tab baru terbuka karena ini adalah aksi user (klik manual)
    });
    
    // === INIT ===
    document.addEventListener('DOMContentLoaded', function() {
      console.log('📄 Halaman perantara SIMPKB dimuat');
    });
  </script>
</body>
</html>
