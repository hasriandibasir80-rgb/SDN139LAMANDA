<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Login - administasi sekali klik</title>
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <h1>🏠 COCOK UNTUK KALANGAN GURU</h1>
      <p>Silakan login untuk melanjutkan</p>
    </div>

    <!-- Demo Credentials (Plain Text) -->
    <div class="demo-credentials">
      🔑 <strong>Demo:</strong> Username: <code>Andi</code> | Password: <code>1981</code>
    </div>

    <!-- Email/Password Form -->
    <form id="emailLoginForm" autocomplete="off">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="contoh@email.com" required inputmode="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required inputmode="text" />
      </div>
      <div id="loginError" class="error-msg" role="alert"></div>
      <button type="submit" class="btn btn-primary" id="loginBtn">🔐 Masuk</button>
    </form>

    <!-- Toggle to User ID Login -->
    <div class="divider">atau</div>
    <button type="button" id="toggleLogin" class="btn btn-text">🆔 Login dengan User ID</button>

    <!-- User ID Form (Hidden by default) -->
    <form id="userIdForm" class="hidden" autocomplete="off">
      <div class="form-group">
        <label for="userId">User ID</label>
        <input type="text" id="userId" placeholder="Masukkan User ID" required inputmode="text" />
      </div>
      <div id="userIdError" class="error-msg" role="alert"></div>
      <button type="submit" class="btn btn-primary" id="userIdBtn">🆔 Masuk</button>
    </form>

    <!-- Logout Button (SULU) - Visible after login -->
    <button id="logoutBtn" class="btn btn-secondary hidden">🚪 SULU (Keluar)</button>
  </div>

  <!-- Firebase Config + Auth Module (type="module" untuk ES6 import) -->
  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./auth-login.js"></script>
  
  <!-- Inline UI Logic -->
  <script>
    // Toggle Email/ID Login
    document.getElementById('toggleLogin')?.addEventListener('click', () => {
      document.getElementById('emailLoginForm').classList.toggle('hidden');
      document.getElementById('userIdForm').classList.toggle('hidden');
      document.getElementById('loginError').textContent = '';
      document.getElementById('userIdError').textContent = '';
    });

    // Handle Email Login Submit
    document.getElementById('emailLoginForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      
      errorEl.textContent = '';
      btn.disabled = true;
      btn.textContent = '⏳ Memproses...';
      
      try {
        if (typeof window.handleEmailLogin === 'function') {
          await window.handleEmailLogin(email, password);
        } else {
          throw new Error('Fungsi login tidak tersedia. Periksa auth-login.js');
        }
      } catch (err) {
        console.error('Login error:', err);
        errorEl.textContent = err.message || 'Login gagal. Periksa kredensial.';
      } finally {
        btn.disabled = false;
        btn.textContent = '🔐 Masuk';
      }
    });

    // Handle User ID Login Submit
    document.getElementById('userIdForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const userId = document.getElementById('userId').value.trim();
      const errorEl = document.getElementById('userIdError');
      const btn = document.getElementById('userIdBtn');
      
      errorEl.textContent = '';
      btn.disabled = true;
      btn.textContent = '⏳ Memproses...';
      
      try {
        if (typeof window.handleUserIdLogin === 'function') {
          await window.handleUserIdLogin(userId);
        } else {
          throw new Error('Fungsi login ID tidak tersedia');
        }
      } catch (err) {
        console.error('UserID login error:', err);
        errorEl.textContent = err.message || 'Login dengan ID gagal';
      } finally {
        btn.disabled = false;
        btn.textContent = '🆔 Masuk';
      }
    });

    // Handle Logout (SULU)
    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
      const btn = document.getElementById('logoutBtn');
      btn.disabled = true;
      try {
        if (typeof window.handleLogout === 'function') {
          await window.handleLogout();
        }
      } catch (err) {
        console.error('Logout error:', err);
        alert('Gagal logout: ' + err.message);
      } finally {
        btn.disabled = false;
      }
    });

    // Debug: Pastikan module terload
    document.addEventListener('DOMContentLoaded', () => {
      console.log('🔐 index.html loaded');
      setTimeout(() => {
        console.log('✅ handleEmailLogin:', typeof window.handleEmailLogin);
        console.log('✅ handleLogout:', typeof window.handleLogout);
      }, 500);
    });
  </script>
</body>
</html>
