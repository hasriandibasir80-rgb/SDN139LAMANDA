<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SDN 139 LAMANDA - sdn139lamanda</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <button class="menu-btn">☰</button>
    <div class="logo-text">SDN<span> 139</span></div>
    <div style="width: 50px;"></div>
  </header>

  <!-- Main Content -->
  <div class="container">
    <h1 class="page-title">Login Untuk Masuk</h1>

    <!-- Login Form -->
    <div class="login-box">
      <form id="loginForm">
        <div class="form-group">
          <span class="form-icon">👤</span>
          <input type="text" class="form-control" placeholder="Username" required>
        </div>

        <div class="form-group">
          <span class="form-icon">🔒</span>
          <input type="password" class="form-control" placeholder="Password" required>
        </div>

        <div class="form-group">
          <div class="captcha-box">
            <span class="form-icon">🛡️</span>
            <input type="text" class="form-control" placeholder="Captcha" style="flex: 1;" required>
            <div class="captcha-image" id="captcha">27855</div>
            <button type="button" class="refresh-captcha" onclick="refreshCaptcha()">🔄</button>
          </div>
        </div>

        <div class="button-group">
          <button type="button" class="btn btn-secondary" onclick="forgotPassword()">Lupa Password</button>
          <button type="submit" class="btn btn-primary">Sign In</button>
        </div>
      </form>
    </div>

    <!-- WAP Version Button -->
    <a href="#" class="wap-btn">VERSI WAP</a>

    <!-- Promo Banner -->
    <div class="promo-banner">
      <div class="promo-title">🎮 SELAMAT DATANG! 🎮</div>
      <div class="promo-subtitle">
        MARI PENUHI<br>
        LAKUKAN<br>
        YANG BEDA DARI BIASANYA
      </div>
      <div style="background: #FFD700; color: #000; padding: 8px 20px; border-radius: 20px; display: inline-block; font-weight: bold; margin-top: 10px;">
        MUDAH SEGALANYA!
      </div>
      <a href="#" class="promo-cta">SILAHKAN COBA →</a>
    </div>

    <!-- Social Media -->
    <div class="social-section">
      <div class="social-title">Follow Sosmed Kami Juga :</div>
      <div class="social-icons">
        <a href="#" class="social-icon instagram">📷</a>
        <a href="#" class="social-icon facebook">f</a>
        <a href="#" class="social-icon telegram">✈️</a>
        <a href="#" class="social-icon twitter">𝕏</a>
        <a href="#" class="social-icon youtube">▶️</a>
        <a href="#" class="social-icon whatsapp">💬</a>
      </div>
    </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="#" class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">BERANDA</span>
    </a>
    <a href="#" class="nav-item">

    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">🎁</span>

    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">💬</span>
      <span class="nav-label">LIVECHAT</span>
    </a>
  </nav>

  <!-- Loading Overlay -->
  <div class="loading" id="loading">

  </div>

</body>
