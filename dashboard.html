<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dashboard - Rumah Anak</title>
  <link rel="stylesheet" href="./css/dashboard.css" />
</head>
<body>
  <div class="container">
    <!-- Header dengan Tombol SULU (Logout) -->
    <header class="dashboard-header">
      <h1>🏠 Rumah Utama</h1>
      <button id="logoutBtn" class="btn-sulu" aria-label="Keluar">🚪 SULU</button>
    </header>

    <!-- Status Message -->
    <div id="status" aria-live="polite" class="status-msg"></div>

    <!-- Market/Period Selector (Persisted via localStorage) -->
    <section class="market-selector">
      <label for="period">Pilih Periode:</label>
      <select id="period" aria-label="Pilih periode">
        <option value="">-- Pilih --</option>
        <option value="15">Tk-Paud</option>
        <option value="16">SD</option>
        <option value="17">MI</option>
        <option value="18">SMP</option>
        <option value="19">MTs</option>
        <option value="20">SMK</option>
        <option value="21">MA</option>
        <option value="22">SMA</option>
        <option value="23">TANYA APA SAJA</option>
      </select>
      <div class="btn-group">
        <button id="savePeriod" class="btn btn-primary">💾 Simpan</button>
        <button id="resetPeriod" class="btn btn-secondary">🗑️ Reset</button>
      </div>
    </section>

    <!-- 7 Feature Cards -->
    <main class="features-grid" role="list">
      <!-- Card akan dirender dinamis oleh dashboard.js -->
      <!-- Template structure per card:
        <article class="feature-card" data-feature="1">
          <h3>Fitur 1</h3>
          <p>Deskripsi singkat</p>
          <div class="sub-features">
            <button data-sub="1">Sub 1</button>
            <button data-sub="2">Sub 2</button>
            <button data-sub="3">Sub 3</button>
          </div>
        </article>
      -->
    </main>

    <!-- Back Button (Visible when in sub-feature view) -->
    <button id="backBtn" class="btn-back hidden" aria-label="Kembali">🔙 Kembali</button>
  </div>

  <!-- Firebase + Auth + Dashboard Logic (type="module") -->
  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./auth-login.js"></script>
  <script type="module" src="./js/dashboard.js"></script>
</body>
</html>
