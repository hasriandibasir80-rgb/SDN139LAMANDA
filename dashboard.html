<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Beranda - SDN 139 LAMANDA</title>
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 20px;
      text-align: center;
    }

    .user-info {
      background: #e3f2fd;
      border-left: 4px solid #2a5298;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .user-info strong {
      color: #1976d2;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #374151;
    }

    select, button {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover {
      background: #45a049;
    }

    #resetBtn {
      background: #f44336;
    }

    #resetBtn:hover {
      background: #d32f2f;
    }

    #logoutBtn {
      background: #ff9800;
      margin-bottom: 20px;
    }

    #logoutBtn:hover {
      background: #f57c00;
    }

    #status {
      text-align: center;
      min-height: 24px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #10b981;
    }

    #childHouses {
      display: none;
      margin-top: 32px;
    }

    #childHouses h2 {
      margin-bottom: 20px;
      color: #2c3e50;
      text-align: center;
    }

    .house-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }

    .house-btn {
      padding: 16px 12px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      display: block;
      line-height: 1.4;
      min-height: 60px;
      transition: background 0.2s;
    }

    .house-btn:hover {
      background: #1976D2;
    }

    @media (max-width: 480px) {
      .container {
        padding: 20px 16px;
      }
      .house-grid {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏠 Beranda</h1>

    <!-- User Info -->
    <div class="user-info" id="userInfo">
      <strong>👤 User:</strong>
      <div id="userDetail">Memuat...</div>
    </div>

    <!-- Logout Button -->
    <button id="logoutBtn">🚪 Keluar (Logout)</button>

    <label for="period">Pilih Kelas</label>
    <select id="period">
      <option value="">-- Pilih Kelas --</option>
      <option value="kelas1">Kelas 1</option>
      <option value="kelas2">Kelas 2</option>
      <option value="kelas3">Kelas 3</option>
      <option value="kelas4">Kelas 4</option>
      <option value="kelas5">Kelas 5</option>
      <option value="kelas6">Kelas 6</option>
      <option value="kolaborasi">Kolaborasi</option>
    </select>

    <div id="status"></div>

    <button id="savePeriod">Simpan Kelas Aktif</button>
    <button id="resetBtn">Reset</button>

    <div id="childHouses">
      <h2>Fitur</h2>
      <div class="house-grid" id="houseList"></div>
    </div>
  </div>

  <!-- Firebase Modules (WAJIB ADA!) -->
  <script type="module" src="./js/firebase-config.js"></script>
  <script type="module" src="./auth-login.js"></script>

  <!-- Dashboard Script -->
  <script src="js/dashboard.js"></script>

  <!-- Auth Check & Logout Handler -->
  <script>
    // === CEK LOGIN STATE ===
    function checkLoginState() {
      const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
      
      if (!currentUser || !currentUser.uid) {
        console.warn('⚠️ User belum login, redirect ke login page...');
        window.location.href = './index.html';
        return false;
      }
      
      // Tampilkan info user
      const userDetail = document.getElementById('userDetail');
      let info = `<div>🆔 UID: <strong>${currentUser.uid}</strong></div>`;
      if (currentUser.displayName) info += `<div>👤 Nama: <strong>${currentUser.displayName}</strong></div>`;
      if (currentUser.email) info += `<div>📧 Email: <strong>${currentUser.email}</strong></div>`;
      if (currentUser.isDemo) info += `<div>🎭 Mode: <strong>Demo</strong></div>`;
      if (currentUser.isCustomId) info += `<div>🔑 Mode: <strong>Custom ID</strong></div>`;
      
      userDetail.innerHTML = info;
      return true;
    }

    // === HANDLE LOGOUT ===
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (!confirm('Yakin ingin keluar?')) return;
      
      try {
        if (typeof window.handleLogout === 'function') {
          await window.handleLogout();
        } else {
          // Fallback jika auth-login.js belum ter-load
          localStorage.removeItem('currentUser');
          window.location.href = './index.html';
        }
      } catch (err) {
        console.error('Logout error:', err);
        alert('Gagal logout: ' + err.message);
      }
    });

    // === INIT ===
    document.addEventListener('DOMContentLoaded', () => {
      console.log('📊 Dashboard loaded');
      
      // Cek login state
      checkLoginState();
      
      // Debug: Pastikan module terload
      setTimeout(() => {
        console.log('✅ handleLogout:', typeof window.handleLogout);
      }, 500);
    });
  </script>
</body>
</html>
