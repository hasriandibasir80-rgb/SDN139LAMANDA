<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Beranda - SDN 139 LAMANDA</title>
  
  <!-- ✅ CSS MODULAR (Struktur Baru Fase 4) -->
  <link rel="stylesheet" href="css/core/variables.css">
  <link rel="stylesheet" href="css/core/reset.css">
  <link rel="stylesheet" href="css/layouts/main-layout.css">
  
  <!-- ✅ CSS Dashboard (Spesifik untuk halaman ini) -->
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="container">
    
    <!-- ✅ HEADER LOGO -->
    <div class="header-logo">
      <img src="logo-aplikasi.png" alt="Logo Aplikasi SDN 139 LAMANDA" class="main-logo" 
           onerror="this.style.display='none'; document.getElementById('fallback-title').style.display='block';">
      
      <!-- Fallback jika logo gagal dimuat -->
      <h1 id="fallback-title" style="display:none; text-align:center; margin-bottom:24px; color:#2c3e50; font-size:1.8rem;">
        🏠 Beranda SDN 139 LAMANDA
      </h1>
    </div>

    <!-- User Info & Logout -->
    <div class="user-info" id="userInfo">
      <strong>👤 User:</strong>
      <div id="userDetail">Memuat...</div>
    </div>
    <button id="logoutBtn" class="btn-logout">🚪 Keluar (Logout)</button>

    <hr class="divider" />

    <!-- Dropdown & Aksi -->
    <label for="layananSelect">Pilih Layanan</label>
    <select id="layananSelect">
      <option value="">-- Pilih Layanan --</option>
      <option value="layanan-portal">Layanan Portal</option>
      <option value="dokumen-arsip">Dokumen Arsip</option>
      <option value="data-statistik">Data Statistik</option>
      <option value="admin-pembelajaran">Administrasi Pembelajaran</option>
      <option value="kolaborasi-global">Kolaborasi</option>
      <option value="monitoring">Monitoring</option>
    </select>

    <div class="action-buttons">
      <button id="saveLayananBtn">Simpan Layanan</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div id="status"></div>

    <hr class="divider" />

    <!-- Area Konten Dinamis -->
    <div id="contentArea" class="content-area"></div>

  </div>

  <!-- ✅ FIREBASE & AUTH -->
  <script type="module" src="./js/firebase-config.js"></script>
  <script type="module" src="./js/auth-login.js"></script>

  <!-- ✅ MODULAR DASHBOARD CONTROLLER -->
  <script type="module">
    import { DashboardController } from './js/controllers/dashboard-controller.js';
    
    document.addEventListener('DOMContentLoaded', () => {
      new DashboardController().init();
    });
  </script>

  <!-- ✅ AUTH CHECK & LOGOUT HANDLER -->
  <script>
    function checkLoginState() {
      const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
      if (!currentUser || !currentUser.uid) {
        window.location.href = './index.html';
        return false;
      }
      const userDetail = document.getElementById('userDetail');
      let info = `<div>🆔 UID: <strong>${currentUser.uid}</strong></div>`;
      if (currentUser.displayName) info += `<div>👤 Nama: <strong>${currentUser.displayName}</strong></div>`;
      if (currentUser.email) info += `<div>📧 Email: <strong>${currentUser.email}</strong></div>`;
      if (currentUser.isDemo) info += `<div>🎭 Mode: <strong>Demo</strong></div>`;
      if (currentUser.isCustomId) info += `<div>🔑 Mode: <strong>Custom ID</strong></div>`;
      userDetail.innerHTML = info;
      return true;
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (!confirm('Yakin ingin keluar?')) return;
      try {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('layananAktif');
        window.location.href = './index.html';
      } catch (err) {
        console.error('Logout error:', err);
        alert('Gagal logout: ' + err.message);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      checkLoginState();
    });
  </script>
</body>
</html>
