<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>beranda</title>
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="container">
    <h1>beranda</h1>

    <label for="period">Pilih kelas</label>
    <select id="period">
      <option value="">-- Pilih kelas --</option>
      <option value="Cambodia">kelas 1</option>
      <option value="Sidney">kelas 2</option>
      <option value="China">kelas 3</option>
      <option value="SGP">kelas 4</option>
      <option value="Japan">kelas 5</option>
      <option value="Taiwan">kelas 6</option>
      <option value="Hongkong">kolaborasi</option>
    </select>

    <div id="status"></div>

    <button id="savePeriod">Simpan kelas Aktif</button>
    <button id="resetBtn">Beranda</button>

    <div id="childHouses">
      <h2>fitur</h2>
      <div class="house-grid" id="houseList"></div>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
