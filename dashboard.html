<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Beranda - SDN 139 LAMANDA</title>
  
  <!-- ✅ HAPUS CSS INLINE, PAKAI YANG EKSTERNAL SAJA -->
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="container">
    <h1>🏠 Beranda</h1>

    <!-- User Info -->
    <div class="user-info" id="userInfo">
      <strong>👤 User:</strong>
      <div id="userDetail">Memuat...</div>
    </div>

    <!-- Logout Button -->
    <button id="logoutBtn">🚪 Keluar (Logout)</button>

    <label for="period">Pilih Kelas</label>
    <select id="period">
      <option value="">-- Pilih Kelas --</option>
      <option value="kelas1">Kelas 1</option>
      <option value="kelas2">Kelas 2</option>
      <option value="kelas3">Kelas 3</option>
      <option value="kelas4">Kelas 4</option>
      <option value="kelas5">Kelas 5</option>
      <option value="kelas6">Kelas 6</option>
      <option value="kolaborasi">Kolaborasi</option>
    </select>

    <div id="status"></div>

    <button id="savePeriod">Simpan Kelas Aktif</button>
    <button id="resetBtn">Reset</button>

    <div id="childHouses">
      <h2>Fitur</h2>
      <div class="house-grid" id="houseList"></div>
    </div>
  </div>

  <!-- ✅ PERBAIKI PATH: auth-login.js seharusnya di folder js/ -->
  <script type="module" src="./js/firebase-config.js"></script>
  <script type="module" src="./js/auth-login.js"></script>

  <!-- Dashboard Script -->
  <script src="js/dashboard.js"></script>

  <!-- Auth Check & Logout Handler -->
  <script>
    // === CEK LOGIN STATE ===
    function checkLoginState() {
      const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
      
      if (!currentUser || !currentUser.uid) {
        console.warn('⚠️ User belum login, redirect ke login page...');
        window.location.href = './index.html';
        return false;
      }
      
      // Tampilkan info user
      const userDetail = document.getElementById('userDetail');
      let info = `<div>🆔 UID: <strong>${currentUser.uid}</strong></div>`;
      if (currentUser.displayName) info += `<div>👤 Nama: <strong>${currentUser.displayName}</strong></div>`;
      if (currentUser.email) info += `<div>📧 Email: <strong>${currentUser.email}</strong></div>`;
      if (currentUser.isDemo) info += `<div>🎭 Mode: <strong>Demo</strong></div>`;
      if (currentUser.isCustomId) info += `<div>🔑 Mode: <strong>Custom ID</strong></div>`;
      
      userDetail.innerHTML = info;
      return true;
    }

    // === HANDLE LOGOUT ===
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (!confirm('Yakin ingin keluar?')) return;
      
      try {
        // ✅ HAPUS localStorage dulu
        localStorage.removeItem('currentUser');
        localStorage.removeItem('fiturAktif');
        
        // Redirect ke login
        window.location.href = './index.html';
      } catch (err) {
        console.error('Logout error:', err);
        alert('Gagal logout: ' + err.message);
      }
    });

    // === INIT ===
    document.addEventListener('DOMContentLoaded', () => {
      console.log('📊 Dashboard loaded');
      checkLoginState();
    });
  </script>
</body>
</html>
